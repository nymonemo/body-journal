<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1e1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Body Journal">
<title>Body Journal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: linear-gradient(160deg, #1e1220 0%, #241526 40%, #1a1528 100%);
  color: #f5e6f0; font-family: sans-serif; min-height: 100vh;
}
#app { max-width: 430px; margin: 0 auto; padding-bottom: 80px; }
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
body::before {
  content: ""; position: fixed; top: -100px; left: -100px;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,182,193,0.08) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: ""; position: fixed; bottom: -80px; right: -80px;
  width: 300px; height: 300px; border-radius: 50%;
  background: radial-gradient(circle, rgba(216,180,254,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
#app { position: relative; z-index: 1; }
</style>
</head>
<body>
<div id="app"></div>
<script>
var FIELDS = [
  {key:"chest",  label:"รอบอก",     icon:"🌸", color:"#f4a7b9"},
  {key:"waist",  label:"รอบเอว",    icon:"🎀", color:"#f9c4d2"},
  {key:"hip",    label:"รอบสะโพก",  icon:"🌺", color:"#e8a0bf"},
  {key:"armL",   label:"แขนซ้าย",   icon:"🍑", color:"#ffcba4"},
  {key:"armR",   label:"แขนขวา",    icon:"🍑", color:"#ffd6b8"},
  {key:"thighL", label:"ต้นขาซ้าย", icon:"🌷", color:"#c9a8e0"},
  {key:"thighR", label:"ต้นขาขวา",  icon:"🌷", color:"#d4b8ec"}
];
var SKEY = "body-journal-v1";
function loadData(){try{var r=localStorage.getItem(SKEY);if(r)return JSON.parse(r);}catch(e){}return[];}
function saveData(r){try{localStorage.setItem(SKEY,JSON.stringify(r));}catch(e){}}
function todayStr(){var d=new Date();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function pad(n){return n<10?"0"+n:""+n;}
function toCm(v){return Math.round(v*2.54*10)/10;}
function fmtDate(s){if(!s)return"";var p=s.slice(0,10).split("-");var d=new Date(+p[0],+p[1]-1,+p[2]);return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"});}

var TIPS = {
chest:  “รอบอก:\n- Push-up 3 เซต x 15 ครั้ง\n- Dumbbell Press 3 เซต x 12 ครั้ง\n- ลดแป้งและน้ำตาล\n- Cardio 30 นาที/วัน”,
waist:  “รอบเอว:\n- Plank 4 เซต x 60 วินาที\n- Bicycle Crunch 3 เซต x 20 ครั้ง\n- Russian Twist 3 เซต x 20 ครั้ง\n- ลดโซเดียม งดน้ำอัดลม”,
hip:    “รอบสะโพก:\n- Sumo Squat 4 เซต x 15 ครั้ง\n- Hip Thrust 4 เซต x 12 ครั้ง\n- Donkey Kick 3 เซต x 15 ครั้ง\n- ปั่นจักรยาน 30 นาที”,
armL:   “แขนซ้าย:\n- Tricep Dip 3 เซต x 15 ครั้ง\n- Overhead Extension 3 เซต x 12 ครั้ง\n- Bicep Curl 3 เซต x 12 ครั้ง\n- ว่ายน้ำ 3 ครั้ง/สัปดาห์”,
armR:   “แขนขวา:\n- Tricep Dip 3 เซต x 15 ครั้ง\n- Overhead Extension 3 เซต x 12 ครั้ง\n- Bicep Curl 3 เซต x 12 ครั้ง\n- ว่ายน้ำ 3 ครั้ง/สัปดาห์”,
thighL: “ต้นขาซ้าย:\n- Sumo Squat 4 เซต x 15 ครั้ง\n- Side Lunge 3 เซต x 12 ครั้ง\n- Curtsy Lunge 3 เซต x 12 ครั้ง\n- ปั่นจักรยาน ระดับแรงต้านสูง”,
thighR: “ต้นขาขวา:\n- Sumo Squat 4 เซต x 15 ครั้ง\n- Side Lunge 3 เซต x 12 ครั้ง\n- Curtsy Lunge 3 เซต x 12 ครั้ง\n- ปั่นจักรยาน ระดับแรงต้านสูง”
};

var state = {
records:loadData(), view:“add”, selDate:todayStr(),
form:{}, note:””, selField:“waist”, summaryRec:null,
advice:null, showImport:false, importText:””, copied:false
};

// Colors
var C = {
bg1:“rgba(255,182,193,0.07)”, br1:“rgba(255,182,193,0.15)”,
bg2:“rgba(232,160,191,0.1)”,  br2:“rgba(244,167,185,0.2)”,
txt:”#f5e6f0”, sub:”#c4849c”, mute:”#a07090”, faint:”#7a5570”,
grad:“linear-gradient(135deg,#e8a0bf,#c9a8e0)”,
gradH:“linear-gradient(90deg,#f4a7b9,#c9a8e0)”,
dark:”#1e1220”, pink:”#f4a7b9”, lav:”#c9a8e0”
};

function el(tag,opts){
var e=document.createElement(tag);
if(opts){
if(opts.style)e.style.cssText=opts.style;
if(opts.cls)e.className=opts.cls;
if(opts.text)e.textContent=opts.text;
}
return e;
}
function card(extra){
var d=document.createElement(“div”);
d.style.cssText=“background:”+C.bg1+”;border:1px solid “+C.br1+”;border-radius:16px;padding:14px 16px;margin-bottom:10px;”+(extra||””);
return d;
}
function mainBtn(txt){
var b=el(“button”,{style:“width:100%;padding:16px;border:none;border-radius:16px;cursor:pointer;background:”+C.grad+”;color:”+C.dark+”;font-size:16px;font-weight:700;font-family:inherit;box-shadow:0 6px 20px rgba(232,160,191,0.3)”,text:txt});
return b;
}

function render(){
var app=document.getElementById(“app”);
app.innerHTML=””;

// Header
var hdr=el(“div”,{style:“padding:28px 20px 14px”});
hdr.appendChild(el(“div”,{style:“font-size:11px;letter-spacing:3px;color:”+C.sub+”;text-transform:uppercase;margin-bottom:4px”,text:“Body Journal”}));
var h1=el(“div”,{style:“font-size:26px;font-weight:700;background:”+C.gradH+”;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px”,text:“สัดส่วนร่างกาย”});
hdr.appendChild(h1);
hdr.appendChild(el(“div”,{style:“font-size:12px;color:”+C.mute,text:state.records.length>0?“บันทึกแล้ว “+state.records.length+” ครั้ง”:“ยังไม่มีข้อมูล”}));
app.appendChild(hdr);

// Nav
var nav=el(“div”,{style:“display:flex;margin:0 20px 16px;background:rgba(255,182,193,0.07);border-radius:16px;padding:4px;gap:2px”});
[{k:“add”,l:“บันทึก”},{k:“compare”,l:“เทียบ”},{k:“history”,l:“ประวัติ”},{k:“chart”,l:“กราฟ”}].forEach(function(t){
var active=state.view===t.k;
var b=el(“button”,{style:“flex:1;padding:9px 0;border:none;border-radius:12px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:”+(active?“700”:“400”)+”;background:”+(active?C.grad:“transparent”)+”;color:”+(active?C.dark:C.mute),text:t.l});
b.onclick=function(){state.view=t.k;render();};
nav.appendChild(b);
});
app.appendChild(nav);

var c=el(“div”,{style:“padding:0 20px”});
if(state.view===“add”)renderAdd(c);
else if(state.view===“summary”)renderSummary(c);
else if(state.view===“compare”)renderCompare(c);
else if(state.view===“history”)renderHistory(c);
else if(state.view===“chart”)renderChart(c);
app.appendChild(c);
}

function renderAdd(c){
var dw=card(“display:flex;align-items:center;gap:10px”);
dw.appendChild(el(“span”,{style:“font-size:18px”,text:“📅”}));
var dd=el(“div”,{style:“flex:1”});
dd.appendChild(el(“div”,{style:“font-size:11px;color:”+C.sub+”;margin-bottom:2px”,text:“วันที่บันทึก”}));
var di=document.createElement(“input”);
di.type=“date”; di.value=state.selDate;
di.style.cssText=“background:transparent;border:none;outline:none;color:”+C.pink+”;font-size:15px;font-weight:600;font-family:inherit;width:100%;color-scheme:dark”;
di.onchange=function(){state.selDate=this.value;};
dd.appendChild(di); dw.appendChild(dd); c.appendChild(dw);
c.appendChild(el(“div”,{style:“font-size:11px;color:”+C.mute+”;margin:4px 0 10px”,text:“กรอกค่าเป็นนิ้ว — แปลงเป็น ซม. อัตโนมัติ”}));

FIELDS.forEach(function(f){
var w=card(“display:flex;align-items:center;gap:12px”);
w.appendChild(el(“span”,{style:“font-size:20px”,text:f.icon}));
var iw=el(“div”,{style:“flex:1”});
iw.appendChild(el(“div”,{style:“font-size:12px;color:”+C.sub+”;margin-bottom:4px”,text:f.label}));
var inp=document.createElement(“input”);
inp.type=“number”; inp.placeholder=“นิ้ว”;
inp.style.cssText=“background:transparent;border:none;outline:none;color:”+C.txt+”;font-size:22px;font-weight:600;font-family:inherit;width:100%”;
if(state.form[f.key])inp.value=state.form[f.key];
iw.appendChild(inp); w.appendChild(iw);
var pv=el(“div”,{style:“text-align:right;display:”+(state.form[f.key]?“block”:“none”)});
var pIn=el(“div”,{style:“font-size:14px;font-weight:700;color:”+f.color,text:(state.form[f.key]||””)+’”’});
var pCm=el(“div”,{style:“font-size:11px;color:”+C.mute,text:toCm(parseFloat(state.form[f.key]||0))+” ซม.”});
pv.appendChild(pIn); pv.appendChild(pCm); w.appendChild(pv);
inp.oninput=function(){
state.form[f.key]=this.value;
pv.style.display=this.value?“block”:“none”;
pIn.textContent=this.value+’”’;
pCm.textContent=toCm(parseFloat(this.value||0))+” ซม.”;
};
c.appendChild(w);
});

var ta=document.createElement(“textarea”);
ta.placeholder=“โน้ตเพิ่มเติม”; ta.rows=2;
ta.style.cssText=“width:100%;background:”+C.bg1+”;border:1px solid “+C.br1+”;border-radius:14px;padding:14px 16px;color:#e8c4d4;font-size:14px;font-family:inherit;resize:none;outline:none;margin-bottom:16px”;
ta.value=state.note; ta.oninput=function(){state.note=this.value;}; c.appendChild(ta);
var btn=mainBtn(“บันทึก & ดูสรุป”);
btn.onclick=function(){
if(!FIELDS.some(function(f){return state.form[f.key];}))return;
var entry={id:Date.now(),date:state.selDate,note:state.note};
FIELDS.forEach(function(f){entry[f.key]=state.form[f.key]?parseFloat(state.form[f.key]):null;});
var recs=state.records.concat([entry]);
recs.sort(function(a,b){return b.date.localeCompare(a.date);});
state.records=recs; saveData(recs);
state.form={}; state.note=””; state.summaryRec=entry; state.view=“summary”; render();
};
c.appendChild(btn);
}

function renderSummary(c){
if(!state.summaryRec)return;
var box=el(“div”,{style:“background:”+C.bg2+”;border:1px solid “+C.br2+”;border-radius:20px;padding:20px;margin-bottom:16px”});
box.appendChild(el(“div”,{style:“font-size:11px;color:”+C.sub+”;letter-spacing:2px;margin-bottom:4px”,text:“สรุปการบันทึก”}));
box.appendChild(el(“div”,{style:“font-size:18px;font-weight:700;color:”+C.pink+”;margin-bottom:14px”,text:“📅 “+fmtDate(state.summaryRec.date)}));
FIELDS.forEach(function(f){
if(state.summaryRec[f.key]==null)return;
var row=el(“div”,{style:“background:rgba(255,182,193,0.07);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between”});
var lbl=el(“div”,{style:“display:flex;align-items:center;gap:8px”});
lbl.appendChild(el(“span”,{text:f.icon}));
lbl.appendChild(el(“span”,{style:“font-size:13px;color:#e8c4d4”,text:f.label}));
row.appendChild(lbl);
var val=el(“div”,{style:“text-align:right”});
val.appendChild(el(“div”,{style:“font-size:17px;font-weight:700;color:”+f.color,text:state.summaryRec[f.key]+’”’}));
val.appendChild(el(“div”,{style:“font-size:11px;color:”+C.mute,text:”= “+toCm(state.summaryRec[f.key])+” ซม.”}));
row.appendChild(val); box.appendChild(row);
});
c.appendChild(box);
var btn=el(“button”,{style:“width:100%;padding:14px;border:1px solid “+C.br2+”;border-radius:14px;background:transparent;color:”+C.pink+”;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer”,text:”+ บันทึกครั้งใหม่”});
btn.onclick=function(){state.view=“add”;render();}; c.appendChild(btn);
}

function cmpSection(title,recA,recB,lblA,lblB){
var box=el(“div”,{style:“background:”+C.bg1+”;border:1px solid “+C.br1+”;border-radius:16px;padding:16px;margin-bottom:14px”});
box.appendChild(el(“div”,{style:“font-size:11px;letter-spacing:2px;color:”+C.sub+”;margin-bottom:10px;text-transform:uppercase”,text:title}));
var dates=el(“div”,{style:“display:flex;justify-content:space-between;margin-bottom:12px”});
var dA=el(“div”,{style:“text-align:center;flex:1”});
dA.appendChild(el(“div”,{style:“font-size:10px;color:”+C.mute,text:lblA}));
dA.appendChild(el(“div”,{style:“font-size:12px;font-weight:700;color:”+C.pink,text:fmtDate(recA.date)}));
dates.appendChild(dA);
dates.appendChild(el(“div”,{style:“display:flex;align-items:center;color:”+C.faint,text:“→”}));
var dB=el(“div”,{style:“text-align:center;flex:1”});
dB.appendChild(el(“div”,{style:“font-size:10px;color:”+C.mute,text:lblB}));
dB.appendChild(el(“div”,{style:“font-size:12px;font-weight:700;color:”+C.pink,text:fmtDate(recB.date)}));
dates.appendChild(dB); box.appendChild(dates);
FIELDS.forEach(function(f){
var vA=recA[f.key],vB=recB[f.key];
if(vA==null&&vB==null)return;
var row=el(“div”,{style:“display:flex;align-items:center;padding:8px 10px;margin-bottom:5px;background:rgba(255,182,193,0.05);border-radius:10px;gap:6px”});
row.appendChild(el(“span”,{style:“font-size:14px;width:20px”,text:f.icon}));
row.appendChild(el(“div”,{style:“font-size:12px;color:#e8c4d4;flex:1”,text:f.label}));
row.appendChild(el(“div”,{style:“font-size:12px;color:”+C.mute,text:vA!=null?vA+’”’:”—”}));
row.appendChild(el(“div”,{style:“font-size:11px;color:”+C.faint,text:“→”}));
row.appendChild(el(“div”,{style:“font-size:12px;color:”+f.color+”;font-weight:700”,text:vB!=null?vB+’”’:”—”}));
if(vA!=null&&vB!=null){
var diff=Math.round((vB-vA)*100)/100;
var isZ=diff===0,isD=diff<0;
var bs=“font-size:11px;font-weight:700;padding:3px 7px;border-radius:7px;white-space:nowrap;”;
if(isZ)bs+=“color:”+C.mute+”;background:rgba(160,112,144,0.1)”;
else if(isD)bs+=“color:#a8d8b0;background:rgba(168,216,176,0.12)”;
else bs+=“color:#f4a7b9;background:rgba(244,167,185,0.15)”;
row.appendChild(el(“div”,{style:bs,text:isZ?”—”:(isD?“▼ “:“▲ “)+Math.abs(diff)+’” / ’+Math.abs(toCm(diff))+” ซม.”}));
}
box.appendChild(row);
});
return box;
}

function renderCompare(c){
var recs=state.records;
if(recs.length<2){
var e=el(“div”,{style:“text-align:center;padding:60px 0;color:”+C.mute});
e.appendChild(el(“div”,{style:“font-size:48px;margin-bottom:12px”,text:“⚖️”}));
e.appendChild(el(“div”,{text:“ต้องมีบันทึกอย่างน้อย 2 ครั้ง”}));
c.appendChild(e); return;
}
var latest=recs[0],prev=recs[1],first=recs[recs.length-1];
var lg=el(“div”,{style:“background:rgba(255,182,193,0.05);border-radius:12px;padding:8px 14px;margin-bottom:14px;font-size:12px;color:”+C.mute+”;display:flex;gap:14px”});
lg.appendChild(el(“span”,{text:“🟢 ลดลง”})); lg.appendChild(el(“span”,{text:“🔴 เพิ่มขึ้น”})); c.appendChild(lg);
c.appendChild(cmpSection(“ล่าสุด vs ก่อนหน้า”,prev,latest,“ครั้งก่อน”,“ล่าสุด”));
if(recs.length>2)c.appendChild(cmpSection(“ล่าสุด vs ครั้งแรกสุด”,first,latest,“ครั้งแรก”,“ล่าสุด”));
var ab=mainBtn(state.advice?“✨ ขอคำแนะนำใหม่”:“✨ ขอคำแนะนำ”);
ab.style.marginTop=“4px”;
ab.onclick=function(){
var inc=FIELDS.filter(function(f){return prev[f.key]!=null&&latest[f.key]!=null&&latest[f.key]>prev[f.key];});
if(!inc.length){state.advice=“🎉 ดีมาก! ไม่มีค่าใดเพิ่มขึ้นเลย”;render();return;}
state.advice=inc.map(function(f){return TIPS[f.key]||f.label;}).join(”\n\n”); render();
}; c.appendChild(ab);
if(state.advice){
var abox=el(“div”,{style:“background:”+C.bg2+”;border:1px solid “+C.br2+”;border-radius:16px;padding:18px;margin-top:12px”});
abox.appendChild(el(“div”,{style:“font-size:11px;letter-spacing:2px;color:”+C.sub+”;margin-bottom:10px;text-transform:uppercase”,text:“💡 คำแนะนำ”}));
abox.appendChild(el(“div”,{style:“font-size:14px;color:#e8c4d4;line-height:1.7;white-space:pre-wrap”,text:state.advice}));
c.appendChild(abox);
}
}

function renderHistory(c){
var bk=el(“div”,{style:“background:”+C.bg1+”;border:1px solid “+C.br1+”;border-radius:16px;padding:14px 16px;margin-bottom:14px”});
bk.appendChild(el(“div”,{style:“font-size:11px;letter-spacing:2px;color:”+C.sub+”;margin-bottom:10px;text-transform:uppercase”,text:“💾 สำรองข้อมูล”}));
var cp=el(“button”,{style:“width:100%;padding:13px;border:none;border-radius:12px;background:”+C.grad+”;color:”+C.dark+”;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px”,text:state.copied?“✅ คัดลอกแล้ว! ไปวางใน Notes ได้เลย”:“📋 Copy ข้อมูลทั้งหมด”});
cp.onclick=function(){
var j=JSON.stringify(state.records,null,2);
if(navigator.clipboard)navigator.clipboard.writeText(j);
else{var t=document.createElement(“textarea”);t.value=j;document.body.appendChild(t);t.select();document.execCommand(“copy”);document.body.removeChild(t);}
state.copied=true;render();setTimeout(function(){state.copied=false;render();},2500);
}; bk.appendChild(cp);
bk.appendChild(el(“div”,{style:“font-size:12px;color:”+C.mute+”;line-height:1.6”,text:“วิธีใช้: กด Copy → เปิด Notes → วางข้อความ → บันทึก”}));
c.appendChild(bk);

var ib=el(“button”,{style:“width:100%;padding:11px;border:1px solid “+C.br1+”;border-radius:12px;background:”+(state.showImport?C.bg2:“transparent”)+”;color:”+C.pink+”;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:14px”,text:“📥 Import JSON (กู้ข้อมูล)”});
ib.onclick=function(){state.showImport=!state.showImport;render();}; c.appendChild(ib);

if(state.showImport){
var ibox=el(“div”,{style:“background:”+C.bg1+”;border:1px solid “+C.br1+”;border-radius:14px;padding:14px;margin-bottom:14px”});
ibox.appendChild(el(“div”,{style:“font-size:12px;color:”+C.pink+”;margin-bottom:8px”,text:“วาง JSON ที่ Copy ไว้ตรงนี้”}));
var ita=document.createElement(“textarea”); ita.rows=5;
ita.style.cssText=“width:100%;background:rgba(30,18,32,0.5);border:1px solid “+C.br1+”;border-radius:10px;padding:10px 12px;color:#e8c4d4;font-size:12px;font-family:monospace;resize:none;outline:none;margin-bottom:8px”;
ita.value=state.importText; ita.oninput=function(){state.importText=this.value;}; ibox.appendChild(ita);
var di=el(“button”,{style:“width:100%;padding:11px;border:none;border-radius:10px;background:”+C.grad+”;color:”+C.dark+”;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer”,text:“นำเข้าข้อมูล”});
di.onclick=function(){
try{
var data=JSON.parse(state.importText);
if(!Array.isArray(data))throw new Error();
var ids={};state.records.forEach(function(r){ids[r.id]=true;});

var t1=document.createElementNS(“http://www.w3.org/2000/svg”,“text”);t1.setAttribute(“x”,x);t1.setAttribute(“y”,“114”);t1.setAttribute(“text-anchor”,“middle”);t1.setAttribute(“font-size”,“9”);t1.setAttribute(“fill”,”#7a5570”);t1.textContent=fmtDate(r.date).slice(0,5);svg.appendChild(t1);
var t2=document.createElementNS(“http://www.w3.org/2000/svg”,“text”);t2.setAttribute(“x”,x);t2.setAttribute(“y”,y-9);t2.setAttribute(“text-anchor”,“middle”);t2.setAttribute(“font-size”,“9”);t2.setAttribute(“fill”,fi.color);t2.textContent=r[state.selField]+’”’;svg.appendChild(t2);
